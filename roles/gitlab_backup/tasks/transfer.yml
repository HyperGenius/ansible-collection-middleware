---
# バックアップファイルをrsyncで転送
- name: Transfer backup files via rsync
  ansible.posix.synchronize:
    src: "{{ gitlab_backup_path }}/"
    dest: "{{ backup_server_user }}@{{ backup_server_host }}:{{ backup_server_path }}/"
    mode: push
    rsync_opts:
      - "--include=*_gitlab_backup.tar"
      - "--include=gitlab-config-*.tar.gz"
      - "--exclude=*"
      - "--remove-source-files"  # 転送後にローカルを削除(任意)
  delegate_to: "{{ groups['gitlab'][0] }}"

# バックアップサーバーで古い世代を削除
- name: Delete old backup generations on backup server
  ansible.builtin.shell: |
    ls -t {{ backup_server_path }}/*_gitlab_backup.tar 2>/dev/null \
    | tail -n +{{ backup_generations + 1 }} \
    | xargs -r rm -f
  delegate_to: "{{ groups['backup'][0] }}"
  become: true
