---
- name: Ensure backup directory exists
  ansible.builtin.file:
    path: "{{ gitlab_backup_path }}"
    state: directory
    owner: git
    group: git
    mode: '0700'
  become: true

- name: Run gitlab-backup create
  ansible.builtin.command: gitlab-backup create BACKUP={{ ansible_date_time.date }}
  become: true
  register: gitlab_backup_result
  failed_when: gitlab_backup_result.rc != 0

- name: Archive gitlab config files
  ansible.builtin.archive:
    path:
      - /etc/gitlab/gitlab.rb
      - /etc/gitlab/gitlab-secrets.json
    dest: "{{ gitlab_backup_path }}/gitlab-config-{{ ansible_date_time.date }}.tar.gz"
    mode: '0600'
  become: true
  when: gitlab_backup_result.rc == 0

- name: Transfer backup files
  ansible.builtin.include_tasks: "transfer_{{ gitlab_backup_transfer_method }}.yml"
  when: gitlab_backup_result.rc == 0

- name: Record backup status to JSON
  ansible.builtin.copy:
    content: |
      {
        "timestamp": "{{ ansible_date_time.iso8601 }}",
        "status": "{{ 'success' if gitlab_backup_result.rc == 0 else 'failure' }}",
        "rc": {{ gitlab_backup_result.rc }},
        "transfer_method": "{{ gitlab_backup_transfer_method }}"
      }
    dest: "{{ gitlab_backup_status_file }}"
    mode: '0644'
  become: true

- name: Log backup result
  ansible.builtin.lineinfile:
    path: "{{ gitlab_backup_log_file }}"
    line: >-
      {{ ansible_date_time.iso8601 }}
      [{{ 'SUCCESS' if gitlab_backup_result.rc == 0 else 'FAILURE' }}]
      GitLab backup completed.
      transfer={{ gitlab_backup_transfer_method }}
      rc={{ gitlab_backup_result.rc }}
    create: true
    mode: '0644'
  become: true
